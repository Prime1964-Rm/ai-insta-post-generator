<html>
<head>
<style>

body{
 width:100%;
 height:100%;
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
 display:flex;
 justify-content:center;
 align-items:center;
 color:#0f172a;
 position:relative;
 overflow:hidden;

/* Light finance gradient */
 background: radial-gradient(circle at 20% 20%, #dbeafe, transparent 40%),
             radial-gradient(circle at 80% 30%, #e0f2fe, transparent 40%),
             radial-gradient(circle at 50% 80%, #ede9fe, transparent 40%),
             #f8fafc;
}

/* Subtle background image layer */
.bg{
 position:absolute;
 inset:0;
 background-image:url("{{bgImage}}");
 background-size:cover;
 background-position:center;
 opacity:0.12;
}

/* White card */
.card{
 width:78%;
 background:white;
 border-radius:36px;
 padding:80px;
 box-shadow:0 40px 120px rgba(0,0,0,0.08);
 position:relative;
 z-index:2;
}

h1{
 font-size:60px;
 margin-bottom:30px;
 line-height:1.1;
}

p{
 font-size:34px;
 color:#334155;
 line-height:1.5;
}

.brand{
 position:absolute;
 bottom:60px;
 left:80px;
 font-size:24px;
 color:#64748b;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
<h1>{{title}}</h1>
<p>{{content}}</p>
</div>

<div class="brand">AI & Finance Daily</div>

</body>
</html>
