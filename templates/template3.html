<html>
<head>
<style>

body{
 width:100%;
 height:100%;
 margin:0;
 display:flex;
 justify-content:center;
 align-items:center;
 font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
 background:#f8fafc;
}

.card{
 width:78%;
 padding:90px;
 background:white;
 border-radius:36px;
 box-shadow:0 30px 80px rgba(0,0,0,0.06);
}

h1{
 font-size:62px;
 color:#111827;
 margin-bottom:30px;
}

p{
 font-size:34px;
 color:#374151;
}

</style>
</head>

<body>

<div class="card">
<h1>{{title}}</h1>
<p>{{content}}</p>
</div>

</body>
</html>
