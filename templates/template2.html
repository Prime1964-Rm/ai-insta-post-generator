<html>
<head>
<style>

body{
 width:100%;
 height:100%;
 margin:0;
 display:flex;
 justify-content:center;
 align-items:center;
 font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;

 background: linear-gradient(135deg,#e0f2fe,#f1f5f9);
}

.card{
 width:78%;
 background:white;
 border-radius:40px;
 padding:80px;
 box-shadow:0 30px 80px rgba(0,0,0,0.08);
}

h1{
 font-size:58px;
 margin-bottom:30px;
 color:#0f172a;
}

p{
 font-size:34px;
 color:#334155;
}

.badges {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

.badge {
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 600;
  font-size: 18px;
  color: white;
  display: inline-block;
}

</style>
</head>

<body>

<div class="card">
<div class="badges">{{badges}}</div>
<h1>{{title}}</h1>
<p>{{content}}</p>
</div>

</body>
</html>
